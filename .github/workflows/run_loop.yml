name: Test YouTube Bot

on:
  workflow_dispatch:

jobs:
  test-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright requests
          playwright install chromium

      - name: Create simple test script
        run: |
          cat > test_bot.py << 'EOF'
          from playwright.sync_api import sync_playwright
          import json
          import time
          import os

          print("="*50)
          print("STARTING SIMPLE TEST")
          print("="*50)

          # Check files
          print("\n1. Checking files...")
          print(f"   link_video.txt exists: {os.path.exists('link_video.txt')}")
          print(f"   settings.json exists: {os.path.exists('settings.json')}")
          print(f"   cookies folder exists: {os.path.exists('cookies')}")
          
          if os.path.exists('cookies'):
              cookies_files = [f for f in os.listdir('cookies') if f.endswith('.json')]
              print(f"   Cookies files: {cookies_files[:5]}")
          
          # Read video URL
          print("\n2. Reading video URL...")
          video_url = None
          if os.path.exists('link_video.txt'):
              with open('link_video.txt', 'r') as f:
                  lines = [l.strip() for l in f.readlines() if l.strip()]
              for line in lines:
                  if 'youtube.com' in line or 'youtu.be' in line:
                      video_url = line.split('?')[0]
                      print(f"   Found: {video_url}")
                      break
          
          if not video_url:
              print("   ERROR: No YouTube URL found!")
              exit(1)
          
          # Launch browser
          print("\n3. Launching browser...")
          with sync_playwright() as p:
              browser = p.chromium.launch(
                  headless=True,
                  args=['--no-sandbox', '--disable-dev-shm-usage']
              )
              print("   Browser launched!")
              
              context = browser.new_context(
                  viewport={'width': 1280, 'height': 720},
                  user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
              )
              print("   Context created!")
              
              # Try to load first account cookie
              account_file = None
              if os.path.exists('cookies'):
                  for f in os.listdir('cookies'):
                      if f.endswith('.json') and not f.endswith('.session'):
                          account_file = f
                          break
              
              if account_file:
                  print(f"   Loading cookies from: {account_file}")
                  with open(f'cookies/{account_file}', 'r') as f:
                      cookies = json.load(f)
                  context.add_cookies(cookies)
                  print(f"   Loaded {len(cookies)} cookies")
              
              page = context.new_page()
              print("   Page created!")
              
              # Go to YouTube
              print("\n4. Going to YouTube...")
              page.goto('https://www.youtube.com', timeout=30000)
              print("   YouTube loaded!")
              time.sleep(3)
              
              # Check login
              print("\n5. Checking login status...")
              try:
                  if page.locator("button#avatar-btn").count() > 0:
                      print("   ✅ Logged in!")
                  else:
                      print("   ⚠️ Not logged in or cookies expired")
              except:
                  print("   ⚠️ Could not verify login")
              
              # Go to video
              print(f"\n6. Going to video: {video_url}")
              page.goto(video_url, timeout=30000)
              print("   Video page loaded!")
              time.sleep(5)
              
              # Try to play video
              print("\n7. Trying to play video...")
              try:
                  page.evaluate("() => { const v = document.querySelector('video'); if(v) v.play(); }")
                  print("   Play command sent!")
              except Exception as e:
                  print(f"   Error: {e}")
              
              # Watch for 30 seconds
              print("\n8. Watching for 30 seconds...")
              for i in range(6):
                  time.sleep(5)
                  print(f"   Watching... {i*5+5}s/30s")
                  
                  # Check if video is playing
                  try:
                      current_time = page.evaluate("() => document.querySelector('video')?.currentTime || 0")
                      print(f"      Current time: {current_time:.1f}s")
                  except:
                      pass
              
              print("\n9. Closing browser...")
              browser.close()
              
              print("\n" + "="*50)
              print("✅ TEST COMPLETED SUCCESSFULLY!")
              print("="*50)
          EOF

      - name: Run test
        run: python test_bot.py
