
name: Infinite Loop Run Python

on:
  workflow_dispatch:
  push:

jobs:
  loop-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright requests
          playwright install chromium
          # បើមាន requirements.txt សូមបន្ថែមបន្ទាត់ខាងក្រោម
          # if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run run.py in infinite loop (5h run + 1min sleep)
        run: |
          while true; do
            echo "Start: $(date)"
            timeout 5h python run.py
            echo "Finished/Stopped at $(date)"
            echo "Waiting 60 seconds before restart..."
            sleep 60
          done

