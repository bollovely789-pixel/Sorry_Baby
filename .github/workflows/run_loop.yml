name: Infinite Loop Run Python

on:
  workflow_dispatch:
  push:

jobs:
  loop-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright requests
          playwright install chromium

      - name: Install V2Ray
        run: |
          # Download V2Ray core
          curl -L https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip -o v2ray.zip
          unzip -o v2ray.zip -d v2ray-core/
          sudo mv v2ray-core/v2ray /usr/local/bin/
          sudo mv v2ray-core/v2ctl /usr/local/bin/
          sudo chmod +x /usr/local/bin/v2ray /usr/local/bin/v2ctl
          mkdir -p ~/.v2ray
          echo "V2Ray installed successfully"
          v2ray --version

      - name: Verify all required files
        run: |
          echo "Checking required files..."
          [ -f link_video.txt ] && echo "✅ link_video.txt" || echo "❌ link_video.txt"
          [ -f settings.json ] && echo "✅ settings.json" || echo "❌ settings.json"
          [ -d cookies ] && echo "✅ cookies folder" || echo "❌ cookies folder"
          ls cookies/*.json 2>/dev/null | head -5
          ls v2ray_*.json 2>/dev/null | head -5

      - name: Run run.py in infinite loop (5h run + 1min wait)
        run: |
          while true; do
            echo "========================================="
            echo "STARTING BOT AT: $(date)"
            echo "========================================="
            
            # Run with V2Ray support
            timeout 5h python run.py
            
            EXIT_CODE=$?
            echo "========================================="
            echo "BOT STOPPED AT: $(date) (Exit code: $EXIT_CODE)"
            echo "========================================="
            
            if [ $EXIT_CODE -eq 124 ]; then
              echo "✓ Bot ran for full 5 hours (timeout)"
            else
              echo "⚠️ Bot stopped early with exit code $EXIT_CODE"
            fi
            
            echo "Waiting 60 seconds before next round..."
            sleep 60
          done
