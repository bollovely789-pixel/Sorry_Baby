name: Infinite Loop Run Python

on:
  workflow_dispatch:
  push:

jobs:
  loop-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright requests
          playwright install chromium

      - name: Verify all required files
        run: |
          echo "Checking required files..."
          [ -f link_video.txt ] && echo "✅ link_video.txt" || echo "❌ link_video.txt"
          [ -f settings.json ] && echo "✅ settings.json" || echo "❌ settings.json"
          [ -d cookies ] && echo "✅ cookies folder" || echo "❌ cookies folder"
          echo "Cookies files:"
          ls cookies/*.json 2>/dev/null | head -5 || echo "No cookies found"
          echo "Done checking files."

      - name: Run run.py in infinite loop (5h run + 1min wait)
        run: |
          while true; do
            echo "========================================="
            echo "STARTING BOT AT: $(date)"
            echo "========================================="
            
            timeout 5h python run.py
            
            echo "========================================="
            echo "BOT STOPPED AT: $(date)"
            echo "Waiting 60 seconds before restart..."
            echo "========================================="
            sleep 60
          done
